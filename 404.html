<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faxr - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0f 0%, #131318 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #FEFFFF;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4D4CD7, #7B7BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        p {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 30px;
            max-width: 400px;
            line-height: 1.6;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #4D4CD7;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 24px;
            border: 1px solid rgba(77, 76, 215, 0.3);
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .links a:hover {
            background: rgba(77, 76, 215, 0.1);
            border-color: #4D4CD7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Use</a>
        </div>
    </div>
</body>
</html>
