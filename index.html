<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faxr - Legal</title>
    <meta name="description" content="Faxr legal documents - Privacy Policy and Terms of Use for the Faxr mobile fax service.">
    <meta name="robots" content="index, follow">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #FEFFFF;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.6;
            margin-bottom: 40px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .links a {
            display: block;
            color: #FEFFFF;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 18px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }

        .links a:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .links a span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            opacity: 0.5;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Faxr</h1>
        <p class="subtitle">Legal Documents</p>
        <div class="links">
            <a href="privacy.html">
                Privacy Policy
                <span>How we collect, use, and protect your data</span>
            </a>
            <a href="terms.html">
                Terms of Use
                <span>Rules and conditions for using Faxr</span>
            </a>
        </div>
    </div>
</body>
</html>
